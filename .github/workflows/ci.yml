name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall cogs_no_diretorio_raiz cogs_no_subdiretorio cogs_no_subdiretorio_do_subdiretorio
